<h1 class="page-title">{{ editando ? 'Editar Campeonato' : 'Nuevo Campeonato' }}</h1>

@if (errorMsg) {
<div class="alert alert-error">{{ errorMsg }}</div>
}

<div class="form-card">
    <form [formGroup]="form" (ngSubmit)="guardar()">
        <div class="form-group">
            <label class="form-label">Nombre</label>
            <input class="form-input" formControlName="nombre" type="text" />
        </div>
        <div class="form-group">
            <label class="form-label">Fecha de Inicio</label>
            <input class="form-input" formControlName="fechaInicio" type="date" />
        </div>
        <div class="form-group">
            <label class="form-label">Cantidad de Equipos</label>
            <input class="form-input" formControlName="cantidadEquipos" type="number" min="2" />
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
                {{ editando ? 'Actualizar' : 'Registrar' }}
            </button>
            <a routerLink="/campeonatos" class="btn btn-ghost">Cancelar</a>
        </div>
    </form>
</div>
